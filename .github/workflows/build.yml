name: CI/CD Build

on:
  push:
    branches:
      - main
      - 'v*'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  APP_NAME: StreamGrab

jobs:
  # ══════════════════════════════════════════════════════════════
  # Job 1: Лinting & Type Checking
  # ══════════════════════════════════════════════════════════════
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flake8 mypy black isort

      - name: Run flake8
        run: |
          flake8 downloader/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 downloader/ --count --ignore=E501,W503 --max-line-length=120 --show-source --statistics

      - name: Check code formatting with black
        run: |
          black --check --diff downloader/ gui_tkinter.py

      - name: Check imports with isort
        run: |
          isort --check-only --diff downloader/

  # ══════════════════════════════════════════════════════════════
  # Job 2: Run Tests
  # ══════════════════════════════════════════════════════════════
  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11']
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-cov pytest-mock pytest-asyncio
          pip install requests PyQt6 yt-dlp ffmpeg-python mutagen

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --cov=downloader --cov-report=xml --cov-report=html --cov-fail-under=60

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

  # ══════════════════════════════════════════════════════════════
  # Job 3: Build Windows
  # ══════════════════════════════════════════════════════════════
  build-windows:
    name: Build Windows (.exe)
    runs-on: windows-latest
    needs: [lint, test]
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/heads/v') || startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Create resources directory
        run: |
          New-Item -ItemType Directory -Force -Path resources

      - name: Build application
        run: |
          pyinstaller StreamGrab.spec --clean --noconfirm --log-level=INFO

      - name: Build portable version
        run: |
          pyinstaller StreamGrab-onefile.spec --onefile --noconfirm --log-level=INFO

      - name: Create output directory
        run: |
          New-Item -ItemType Directory -Force -Path output

      - name: Prepare artifacts
        run: |
          Copy-Item -Recurse dist/StreamGrab output/
          Copy-Item dist/StreamGrab.exe output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: StreamGrab-windows-${{ github.ref_name }}
          path: output/
          retention-days: 30

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            output/StreamGrab/*.exe
            output/StreamGrab.exe
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ══════════════════════════════════════════════════════════════
  # Job 4: Build Linux
  # ══════════════════════════════════════════════════════════════
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/heads/v') || startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')

    container:
      image: python:${{ env.PYTHON_VERSION }}-slim

    steps:
      - name: Install system dependencies
        run: |
          apt-get update && apt-get install -y \
            ffmpeg \
            libxcb-xinerama0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libxkbcommon-x11-0 \
            libegl1 \
            libgl1 \
            libdbus-1-3 \
            libx11-6 \
            libxext6 \
            libxrender1 \
            libnss3 \
            libnspr4 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libasound2

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Create resources directory
        run: |
          mkdir -p resources

      - name: Build application
        run: |
          pyinstaller StreamGrab.spec --clean --noconfirm --log-level=INFO

      - name: Build portable version
        run: |
          pyinstaller StreamGrab-onefile.spec --onefile --noconfirm --log-level=INFO

      - name: Prepare artifacts
        run: |
          mkdir -p output
          cp -r dist/StreamGrab output/
          cp dist/StreamGrab output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: StreamGrab-linux-${{ github.ref_name }}
          path: output/
          retention-days: 30

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            output/StreamGrab/*
            output/StreamGrab
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ══════════════════════════════════════════════════════════════
  # Job 5: Build macOS
  # ══════════════════════════════════════════════════════════════
  build-macos:
    name: Build macOS (.app)
    runs-on: macos-latest
    needs: [lint, test]
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/heads/v') || startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          brew install ffmpeg
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Create resources directory
        run: |
          mkdir -p resources

      - name: Build application
        run: |
          pyinstaller StreamGrab.spec --clean --noconfirm --log-level=INFO

      - name: Build portable version
        run: |
          pyinstaller StreamGrab-onefile.spec --onefile --noconfirm --log-level=INFO

      - name: Prepare artifacts
        run: |
          mkdir -p output
          cp -r dist/StreamGrab.app output/
          cp dist/StreamGrab output/StreamGrab_mac

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: StreamGrab-macos-${{ github.ref_name }}
          path: output/
          retention-days: 30

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            output/StreamGrab.app/*
            output/StreamGrab_mac
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ══════════════════════════════════════════════════════════════
  # Job 6: Create GitHub Release
  # ══════════════════════════════════════════════════════════════
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Display structure
        run: |
          ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## 📦 Download StreamGrab Pro v${{ github.ref_name }}

            ### Скачать
            - **Windows**: `StreamGrab.exe` (portable) или папка `StreamGrab/`
            - **Linux**: Распаковать и сделать исполняемым
            - **macOS**: Открыть `StreamGrab.app`

            ### ⚠️ Требования
            - FFmpeg для извлечения аудио ([скачать](https://ffmpeg.org/download.html))

            ### 📋 Изменения
            Автоматическая сборка из GitHub Actions

            ### 📝 Changelog
            Full changelog: https://github.com/${{ github.repository }}/releases

          files: |
            StreamGrab.exe
            StreamGrab/*
            StreamGrab.app/*
            StreamGrab_mac
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ══════════════════════════════════════════════════════════════
  # Job 7: Summary
  # ══════════════════════════════════════════════════════════════
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [lint, test, build-windows, build-linux, build-macos]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "## 🏗️ Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows Build | ${{ needs.build-windows.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux Build | ${{ needs.build-linux.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS Build | ${{ needs.build-macos.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "📝 Builds available as artifacts" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ github.ref }}" == *"refs/tags/"* ]]; then
            echo "🚀 Release created at https://github.com/${{ github.repository }}/releases/latest" >> $GITHUB_STEP_SUMMARY
          fi
