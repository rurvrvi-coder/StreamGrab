name: CI/CD Build

on:
  push:
    branches: [main, 'v*']
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  APP_NAME: StreamGrab

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: pip install flake8 black isort
      - run: flake8 downloader/ --count --select=E9,F63,F7,F82 --show-source --statistics
      - run: black --check --diff downloader/ gui_tkinter.py
      - run: isort --check-only --diff downloader/

  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11']
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - run: pip install pytest requests yt-dlp mutagen
      - run: python -m pytest tests/ -v --cov=downloader --cov-fail-under=50

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: [lint, test]
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: pip install -r requirements.txt pyinstaller
      - run: New-Item -ItemType Directory -Force -Path resources
      - run: pyinstaller StreamGrab.spec --clean --noconfirm
      - run: pyinstaller StreamGrab-onefile.spec --onefile --noconfirm
      - run: New-Item -ItemType Directory -Force -Path output
      - run: Copy-Item -Recurse dist/StreamGrab output/ ; Copy-Item dist/StreamGrab.exe output/
      - uses: actions/upload-artifact@v4
        with:
          name: StreamGrab-windows
          path: output/

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: pip install -r requirements.txt pyinstaller
      - run: mkdir -p resources
      - run: pyinstaller StreamGrab.spec --clean --noconfirm
      - run: mkdir -p output && cp -r dist/StreamGrab output/
      - uses: actions/upload-artifact@v4
        with:
          name: StreamGrab-linux
          path: output/

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: [lint, test]
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: pip install -r requirements.txt pyinstaller
      - run: mkdir -p resources
      - run: pyinstaller StreamGrab.spec --clean --noconfirm
      - run: mkdir -p output && cp -r dist/StreamGrab.app output/
      - uses: actions/upload-artifact@v4
        with:
          name: StreamGrab-macos
          path: output/
